  <!-- ===== PWA INSTALL BANNER (lightweight inline styles) ===== -->
  <style>
    @keyframes slideDown {
      0% { opacity: 0; transform: translateX(-50%) translateY(-120%); }
      60% { opacity: 1; transform: translateX(-50%) translateY(6%); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .installBanner {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 32px); max-width: 400px;
      background: rgba(22,22,24,0.88); backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px); border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 12px 40px rgba(0,0,0,0.55), 0 0 0 0.5px rgba(255,255,255,0.06) inset;
      z-index: 999999; padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      font-family: -apple-system, 'Inter', system-ui, sans-serif;
      color: #f5f5f7; cursor: pointer;
      animation: slideDown 0.45s cubic-bezier(0.22,1,0.36,1);
      transition: all 0.25s ease; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .installBanner:hover {
      background: rgba(30,30,34,0.9); border-color: rgba(255,255,255,0.18);
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(255,255,255,0.1) inset;
    }
    .installBanner:active { transform: translateX(-50%) translateY(0); transition: all 0.1s ease; }
    .installBanner::before {
      content: ''; position: absolute; left: 0; top: 20%; height: 60%; width: 3px;
      background: linear-gradient(to bottom, #4da6ff, #0969da); border-radius: 0 3px 3px 0;
    }
    .bannerText { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .bannerTitle { font-size: 0.92rem; font-weight: 600; letter-spacing: -0.2px; color: #fff; margin: 0; line-height: 1.2; }
    .bannerDesc { font-size: 0.75rem; font-weight: 400; color: rgba(255,255,255,0.55); letter-spacing: 0.1px; line-height: 1.3; margin: 0; }
    .bannerArrow {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .installBanner:hover .bannerArrow { background: rgba(255,255,255,0.2); transform: translateX(2px); }
    .bannerArrow svg { width: 14px; height: 14px; stroke: rgba(255,255,255,0.8); stroke-width: 2; fill: none; }
    @media (max-width: 380px) {
      .installBanner { padding: 12px 14px; }
      .bannerTitle { font-size: 0.85rem; }
      .bannerDesc { font-size: 0.7rem; }
    }
  </style>

  <!-- ===== PWA INSTALL SCRIPT ===== -->
  <script>
    (function() {
      if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) return;
      let deferredPrompt;
      let banner;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (banner) { banner.style.pointerEvents = 'auto'; banner.style.opacity = '1'; }
      });

      banner = document.createElement('div');
      banner.className = 'installBanner';
      banner.style.pointerEvents = 'none';
      banner.innerHTML = `
        <div class="bannerText">
          <p class="bannerTitle">Install App</p>
          <p class="bannerDesc">Add to Home Screen for fast, full‑screen access</p>
        </div>
        <div class="bannerArrow">
          <svg viewBox="0 0 24 24"><polyline points="7 17 12 22 17 17"/><line x1="12" y1="22" x2="12" y2="2"/></svg>
        </div>
      `;
      document.body.prepend(banner);

      banner.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (outcome === 'accepted') banner.remove();
      });

      setTimeout(() => {
        if (banner && banner.parentNode) {
          banner.style.opacity = '0';
          banner.style.pointerEvents = 'none';
          setTimeout(() => { if (banner.parentNode) banner.remove(); }, 250);
        }
      }, 3000);

      window.addEventListener('appinstalled', () => {
        if (banner && banner.parentNode) banner.remove();
      });
    })();
  </script>
